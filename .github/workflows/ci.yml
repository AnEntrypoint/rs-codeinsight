name: Build (WASM)

on:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**', 'LICENSE', '.gitignore']
  pull_request:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**', 'LICENSE', '.gitignore']
  workflow_dispatch:

concurrency:
  group: build-wasm-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Add wasm32-unknown-unknown target
        run: rustup target add wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm32-unknown-unknown

      - name: Build WASM binary
        run: cargo build --release --target wasm32-unknown-unknown --features wasm,all-languages

      - name: Extract WASM artifact
        run: |
          mkdir -p release-assets
          cp target/wasm32-unknown-unknown/release/rs_codeinsight.wasm release-assets/codeinsight.wasm

      - name: Generate checksum
        run: |
          cd release-assets
          sha256sum codeinsight.wasm | sed 's/ \*/  /' > codeinsight.wasm.sha256
          cat codeinsight.wasm.sha256

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/.*= "//' | sed 's/".*//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create version file
        run: |
          echo "${{ steps.version.outputs.version }}" > release-assets/codeinsight.wasm.version

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: codeinsight-wasm
          path: release-assets/

  release:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/.*= "//' | sed 's/".*//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload to plugkit-bin Release
        run: |
          gh release upload "v${{ steps.version.outputs.version }}" \
            --repo AnEntrypoint/plugkit-bin \
            --clobber \
            artifacts/codeinsight-wasm/codeinsight.wasm \
            artifacts/codeinsight-wasm/codeinsight.wasm.sha256 \
            artifacts/codeinsight-wasm/codeinsight.wasm.version || true
        env:
          GH_TOKEN: ${{ github.token }}
