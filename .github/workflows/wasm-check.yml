name: Wasm Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: wasm-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cargo-check-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - run: rustup target add wasm32-wasip1
      - name: Install wasi-sdk
        shell: bash
        run: |
          set -e
          WASI_VERSION=24
          curl -sL -o wasi-sdk.tar.gz "https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_VERSION}/wasi-sdk-${WASI_VERSION}.0-x86_64-linux.tar.gz"
          mkdir -p $HOME/wasi-sdk
          tar -xzf wasi-sdk.tar.gz -C $HOME/wasi-sdk --strip-components=1
          echo "WASI_SDK_PATH=$HOME/wasi-sdk" >> $GITHUB_ENV
          echo "CC_wasm32_wasip1=$HOME/wasi-sdk/bin/clang" >> $GITHUB_ENV
          echo "AR_wasm32_wasip1=$HOME/wasi-sdk/bin/llvm-ar" >> $GITHUB_ENV
          echo "CFLAGS_wasm32_wasip1=--sysroot=$HOME/wasi-sdk/share/wasi-sysroot" >> $GITHUB_ENV
      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm-check-wasm32-wasip1
      - run: cargo check --target wasm32-wasip1 --no-default-features --features wasm --lib
