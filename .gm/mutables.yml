- id: oversized-file-skip-plumbing
  status: witnessed
  description: collect_all_files (lib.rs:170-212) has no skipped_files concept at all -- it silently continues past oversized files (line 202) and also silently includes files when metadata() errors (no continue in Err arm, meaning file is NOT excluded on metadata error, contradicting audit's claim of inversion -- actual bug is metadata-error files pass through unchecked-size, not that oversized files are wrongly included). skipped_files vec is built later in analyze_files (lib.rs:57-164) only from parse/read failures. Need collect_all_files to return skip reasons alongside kept files, threaded through filter_supported/collect_files/analyze into the existing skipped_files vec.
  witness: C:\dev\rs-codeinsight\src\lib.rs lines 170-212, 57-164 (codesearch ci-dbdde61e-d23592c8-5, ci-dbdde61e-d23592c8-7)
  witness_evidence: 'lib.rs:170-212 collect_all_files: line 201-203 ''if let Ok(meta) = path.metadata() { if meta.len() > max_file_size { continue; } }'' -- Ok-arm correctly excludes oversized (continue), so the audit''s claimed inversion (metadata error including oversized file) is not literally present; actual defect is (a) no skip-reason recorded for the oversized continue at all, and (b) Err(metadata()) arm has no else -- file proceeds unchecked-size when metadata() fails, silently including a potentially-oversized file with zero record. Fix: change collect_all_files return type to also carry (path, reason) skips for both cases, thread through filter_supported/analyze/analyze_with_files into analyze_files'' existing skipped_files accumulation (lib.rs:113-120 filter_map pattern), reusing the same Vec<(String,String)> shape already used for UTF-8/parse-failure skips.'
